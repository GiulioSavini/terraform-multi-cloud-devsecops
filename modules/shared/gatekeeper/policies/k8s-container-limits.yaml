---
# ConstraintTemplate: Require container resource limits
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8scontainerlimits
  annotations:
    description: "Requires containers to have resource limits (CPU and memory) defined"
spec:
  crd:
    spec:
      names:
        kind: K8sContainerLimits
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8scontainerlimits

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits
          msg := sprintf("Container '%v' in %v '%v/%v' must have resource limits defined", [
            container.name,
            input.review.object.kind,
            input.review.object.metadata.namespace,
            input.review.object.metadata.name
          ])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.cpu
          msg := sprintf("Container '%v' in %v '%v/%v' must have CPU limits defined", [
            container.name,
            input.review.object.kind,
            input.review.object.metadata.namespace,
            input.review.object.metadata.name
          ])
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          not container.resources.limits.memory
          msg := sprintf("Container '%v' in %v '%v/%v' must have memory limits defined", [
            container.name,
            input.review.object.kind,
            input.review.object.metadata.namespace,
            input.review.object.metadata.name
          ])
        }
---
# Constraint: Require resource limits on all workload containers
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sContainerLimits
metadata:
  name: require-container-limits
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
      - apiGroups: ["batch"]
        kinds: ["Job", "CronJob"]
    excludedNamespaces:
      - kube-system
      - kube-public
      - gatekeeper-system
      - cert-manager
      - ingress-nginx
      - external-dns
      - vault
      - monitoring
      - linkerd
      - linkerd-viz
