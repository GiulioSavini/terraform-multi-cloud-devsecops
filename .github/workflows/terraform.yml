name: "Terraform CI/CD"

on:
  push:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'
      - 'examples/**'
      - '*.hcl'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'environments/**'
      - 'modules/**'
      - 'examples/**'
      - '*.hcl'

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.7.5"
  TG_VERSION: "0.55.18"
  TFLINT_VERSION: "0.50.3"

jobs:
  # ─── Code Quality ────────────────────────────────────────────
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v${{ env.TFLINT_VERSION }}

      - name: TFLint
        run: |
          tflint --init
          find . -name "*.tf" -exec dirname {} \; | sort -u | while read dir; do
            echo "::group::Linting $dir"
            tflint --chdir="$dir" --format=compact || true
            echo "::endgroup::"
          done

  # ─── Security Scanning ──────────────────────────────────────
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Trivy (IaC scan)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Run Checkov
        run: |
          pip install -q checkov
          checkov -d . --quiet --compact --soft-fail \
            --framework terraform \
            --output cli \
            || true

  # ─── Plan (per environment) ─────────────────────────────────
  plan:
    name: "Plan - ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'pull_request' && vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stg, prd]
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        working-directory: environments/${{ matrix.environment }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: environments/${{ matrix.environment }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: environments/${{ matrix.environment }}
        run: |
          terraform plan -input=false -no-color -out=tfplan \
            -var-file=terraform.tfvars 2>&1 | tee plan_output.txt
          echo "plan_text<<PLAN_DELIMITER" >> $GITHUB_OUTPUT
          head -c 60000 plan_output.txt >> $GITHUB_OUTPUT
          echo "PLAN_DELIMITER" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `### Terraform Plan - \`${{ matrix.environment }}\`

            \`\`\`
            ${{ steps.plan.outputs.plan_text }}
            \`\`\`

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─── Infracost ──────────────────────────────────────────────
  infracost:
    name: "Cost Estimation"
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost diff
        run: |
          infracost diff \
            --path=environments/dev \
            --format=json \
            --out-file=/tmp/infracost.json
        continue-on-error: true

      - name: Post Infracost comment
        uses: infracost/actions/comment@v3
        with:
          path: /tmp/infracost.json
          behavior: update
        continue-on-error: true

  # ─── Apply ──────────────────────────────────────────────────
  apply:
    name: "Apply - ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        environment: [dev, stg, prd]
    environment:
      name: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        working-directory: environments/${{ matrix.environment }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: environments/${{ matrix.environment }}
        run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars
